<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Fingerprint Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .input-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .input-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .url-input {
            flex: 1;
            min-width: 250px;
        }
        
        .url-input label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        
        .url-input input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            align-self: flex-end;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .mode-toggle {
            text-align: center;
            margin-top: 20px;
        }
        
        .mode-toggle button {
            background: #ddd;
            color: #333;
            margin: 0 10px;
            padding: 8px 20px;
        }
        
        .mode-toggle button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .results {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .fingerprint-card {
            flex: 1;
            min-width: 500px;
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fingerprint-card h2 {
            color: #667eea;
            margin-bottom: 10px;
            word-break: break-all;
            font-size: 18px;
        }
        
        .timestamp {
            color: #666;
            font-size: 12px;
            margin-bottom: 15px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .behavior-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .behavior-badge.Streaming { background: #ff6b6b; color: white; }
        .behavior-badge.Social-Media { background: #4ecdc4; color: white; }
        .behavior-badge.Static-Content { background: #45b7d1; color: white; }
        .behavior-badge.API-Heavy { background: #f9ca24; color: #333; }
        .behavior-badge.Unknown { background: #95a5a6; color: white; }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        
        .chart-container {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }
        
        .chart-container h4 {
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }
        
        .full-width {
            grid-column: span 2;
        }
        
        canvas {
            max-height: 250px;
            width: 100%;
        }
        
        .comparison-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .comparison-section h3 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .comparison-table {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .comparison-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        .winner {
            color: #27ae60;
            font-weight: bold;
        }
        
        .loader {
            text-align: center;
            padding: 50px;
            display: none;
        }
        
        .loader.active {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .error.active {
            display: block;
        }
        
        .metric-higher {
            color: #dc3545;
            font-weight: bold;
        }
        
        .metric-lower {
            color: #28a745;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Network Fingerprint Generator</h1>
        
        <div class="input-section">
            <div class="input-group">
                <div class="url-input">
                    <label>Website 1 URL</label>
                    <input type="text" id="url1" placeholder="https://google.com">
                </div>
                <div class="url-input" id="url2Container" style="display: none;">
                    <label>Website 2 URL</label>
                    <input type="text" id="url2" placeholder="https://youtube.com">
                </div>
                <button id="analyzeBtn">🔍 Analyze</button>
            </div>
            <div class="mode-toggle">
                <button id="singleModeBtn" class="active">📄 Single Website</button>
                <button id="compareModeBtn">🔄 Compare Websites</button>
            </div>
        </div>
        
        <div class="error" id="errorMsg"></div>
        
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="margin-top: 20px;">Capturing network packets for 10 seconds...</p>
        </div>
        
        <div id="results"></div>
    </div>
    
    <script>
        let isCompareMode = false;
        let charts = {}; // Store chart instances to destroy old ones
        
        document.getElementById('singleModeBtn').onclick = () => {
            isCompareMode = false;
            document.getElementById('singleModeBtn').classList.add('active');
            document.getElementById('compareModeBtn').classList.remove('active');
            document.getElementById('url2Container').style.display = 'none';
            document.getElementById('results').innerHTML = '';
        };
        
        document.getElementById('compareModeBtn').onclick = () => {
            isCompareMode = true;
            document.getElementById('compareModeBtn').classList.add('active');
            document.getElementById('singleModeBtn').classList.remove('active');
            document.getElementById('url2Container').style.display = 'block';
            document.getElementById('results').innerHTML = '';
        };
        
        document.getElementById('analyzeBtn').onclick = async () => {
            const url1 = document.getElementById('url1').value.trim();
            const url2 = document.getElementById('url2').value.trim();
            
            if (!url1) {
                showError('Please enter a URL');
                return;
            }
            if (isCompareMode && !url2) {
                showError('Please enter both URLs for comparison');
                return;
            }
            
            hideError();
            showLoader(true);
            
            try {
                let response;
                if (isCompareMode) {
                    response = await fetch('/api/compare', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url1, url2 })
                    });
                    const data = await response.json();
                    displayComparison(data);
                } else {
                    response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: url1 })
                    });
                    const data = await response.json();
                    displaySingle(data);
                }
            } catch (err) {
                showError('Error: ' + err.message);
            } finally {
                showLoader(false);
            }
        };
        
        function displaySingle(data) {
            const container = document.getElementById('results');
            
            // Format behavior label for CSS class
            const behaviorClass = data.behavior_label ? data.behavior_label.replace(/ /g, '-') : 'Unknown';
            
            container.innerHTML = `
                <div class="fingerprint-card">
                    <h2>🔗 ${escapeHtml(data.site_url)}</h2>
                    <div class="timestamp">📅 ${new Date(data.capture_timestamp).toLocaleString()}</div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">Total Packets</div>
                            <div class="stat-value">${data.total_packets || 0}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Total Bytes</div>
                            <div class="stat-value">${((data.total_bytes || 0)/1024).toFixed(2)} KB</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Mean Packet Size</div>
                            <div class="stat-value">${(data.mean_packet_size || 0).toFixed(2)} bytes</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Top Protocol</div>
                            <div class="stat-value">${data.top_protocol || 'None'}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Unique IPs</div>
                            <div class="stat-value">${data.unique_ips_count || 0}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">DNS Queries</div>
                            <div class="stat-value">${(data.dns_queries || []).length}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Max Packet Size</div>
                            <div class="stat-value">${data.max_packet_size || 0} bytes</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Min Packet Size</div>
                            <div class="stat-value">${data.min_packet_size || 0} bytes</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Confidence</div>
                            <div class="stat-value">${data.behavior_confidence || 0}%</div>
                        </div>
                    </div>
                    
                    <div class="behavior-badge ${behaviorClass}">
                        ${data.behavior_label || 'Unknown'} (${data.behavior_confidence || 0}%)
                    </div>
                    
                    <div class="charts-grid">
                        <div class="chart-container">
                            <h4>📊 Protocol Distribution</h4>
                            <canvas id="pieChart"></canvas>
                        </div>
                        <div class="chart-container">
                            <h4>📏 Packet Size Histogram</h4>
                            <canvas id="histChart"></canvas>
                        </div>
                        <div class="chart-container full-width">
                            <h4>📈 Traffic Timeline (Bytes/sec)</h4>
                            <canvas id="timeChart"></canvas>
                        </div>
                    </div>
                </div>
            `;
            
            // Create charts
            createPieChart('pieChart', data.protocol_distribution || {});
            createHistogram('histChart', data.packet_sizes || []);
            createTimeline('timeChart', data.timestamps || []);
        }
        
        function displayComparison(data) {
            const w1 = data.website1;
            const w2 = data.website2;
            const comp = data.comparison;
            
            const behaviorClass1 = w1.behavior_label ? w1.behavior_label.replace(/ /g, '-') : 'Unknown';
            const behaviorClass2 = w2.behavior_label ? w2.behavior_label.replace(/ /g, '-') : 'Unknown';
            
            const container = document.getElementById('results');
            container.innerHTML = `
                <div style="display: flex; gap: 30px; flex-wrap: wrap;">
                    <!-- Website 1 Card -->
                    <div class="fingerprint-card">
                        <h2>🔗 ${escapeHtml(w1.site_url)}</h2>
                        <div class="timestamp">📅 ${new Date(w1.capture_timestamp).toLocaleString()}</div>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-label">Packets</div>
                                <div class="stat-value ${w1.total_packets > w2.total_packets ? 'metric-higher' : 'metric-lower'}">${w1.total_packets || 0}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Bytes (KB)</div>
                                <div class="stat-value ${w1.total_bytes > w2.total_bytes ? 'metric-higher' : 'metric-lower'}">${((w1.total_bytes || 0)/1024).toFixed(2)}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Mean Size</div>
                                <div class="stat-value ${w1.mean_packet_size > w2.mean_packet_size ? 'metric-higher' : 'metric-lower'}">${(w1.mean_packet_size || 0).toFixed(2)}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Top Protocol</div>
                                <div class="stat-value">${w1.top_protocol || 'None'}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Unique IPs</div>
                                <div class="stat-value ${w1.unique_ips_count > w2.unique_ips_count ? 'metric-higher' : 'metric-lower'}">${w1.unique_ips_count || 0}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">DNS Queries</div>
                                <div class="stat-value">${(w1.dns_queries || []).length}</div>
                            </div>
                        </div>
                        <div class="behavior-badge ${behaviorClass1}">
                            ${w1.behavior_label || 'Unknown'} (${w1.behavior_confidence || 0}%)
                        </div>
                        <div class="charts-grid">
                            <div class="chart-container"><h4>Protocols</h4><canvas id="pie1"></canvas></div>
                            <div class="chart-container"><h4>Packet Sizes</h4><canvas id="hist1"></canvas></div>
                            <div class="chart-container full-width"><h4>Traffic Timeline</h4><canvas id="time1"></canvas></div>
                        </div>
                    </div>
                    
                    <!-- Website 2 Card -->
                    <div class="fingerprint-card">
                        <h2>🔗 ${escapeHtml(w2.site_url)}</h2>
                        <div class="timestamp">📅 ${new Date(w2.capture_timestamp).toLocaleString()}</div>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-label">Packets</div>
                                <div class="stat-value ${w2.total_packets > w1.total_packets ? 'metric-higher' : 'metric-lower'}">${w2.total_packets || 0}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Bytes (KB)</div>
                                <div class="stat-value ${w2.total_bytes > w1.total_bytes ? 'metric-higher' : 'metric-lower'}">${((w2.total_bytes || 0)/1024).toFixed(2)}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Mean Size</div>
                                <div class="stat-value ${w2.mean_packet_size > w1.mean_packet_size ? 'metric-higher' : 'metric-lower'}">${(w2.mean_packet_size || 0).toFixed(2)}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Top Protocol</div>
                                <div class="stat-value">${w2.top_protocol || 'None'}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Unique IPs</div>
                                <div class="stat-value ${w2.unique_ips_count > w1.unique_ips_count ? 'metric-higher' : 'metric-lower'}">${w2.unique_ips_count || 0}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">DNS Queries</div>
                                <div class="stat-value">${(w2.dns_queries || []).length}</div>
                            </div>
                        </div>
                        <div class="behavior-badge ${behaviorClass2}">
                            ${w2.behavior_label || 'Unknown'} (${w2.behavior_confidence || 0}%)
                        </div>
                        <div class="charts-grid">
                            <div class="chart-container"><h4>Protocols</h4><canvas id="pie2"></canvas></div>
                            <div class="chart-container"><h4>Packet Sizes</h4><canvas id="hist2"></canvas></div>
                            <div class="chart-container full-width"><h4>Traffic Timeline</h4><canvas id="time2"></canvas></div>
                        </div>
                    </div>
                </div>
                
                <!-- Comparison Report -->
                <div class="comparison-section">
                    <h3>📊 Comparison Report</h3>
                    <div class="comparison-table">
                        <div class="comparison-item">📦 More Packets: <span class="winner">${comp.more_packets || 'N/A'}</span></div>
                        <div class="comparison-item">💾 More Bytes: <span class="winner">${comp.more_bytes || 'N/A'}</span></div>
                        <div class="comparison-item">📏 Larger Packets: <span class="winner">${comp.larger_packets || 'N/A'}</span></div>
                        <div class="comparison-item">📈 Packet Diff: ${comp.packet_diff || 0}</div>
                        <div class="comparison-item">💿 Bytes Diff: ${((comp.bytes_diff || 0)/1024).toFixed(2)} KB</div>
                        <div class="comparison-item">📐 Size Diff: ${(comp.size_diff || 0).toFixed(2)} bytes</div>
                        <div class="comparison-item">🖥️ IPs Diff: ${comp.ips_diff || 0}</div>
                    </div>
                </div>
            `;
            
            // Create charts for both websites
            createPieChart('pie1', w1.protocol_distribution || {});
            createHistogram('hist1', w1.packet_sizes || []);
            createTimeline('time1', w1.timestamps || []);
            
            createPieChart('pie2', w2.protocol_distribution || {});
            createHistogram('hist2', w2.packet_sizes || []);
            createTimeline('time2', w2.timestamps || []);
        }
        
        function createPieChart(canvasId, data) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            // Destroy existing chart if any
            if (charts[canvasId]) {
                charts[canvasId].destroy();
            }
            
            const labels = Object.keys(data);
            const values = Object.values(data);
            
            // If no data, show placeholder
            if (labels.length === 0) {
                charts[canvasId] = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: ['No Data'],
                        datasets: [{ data: [1], backgroundColor: ['#ccc'] }]
                    },
                    options: { responsive: true, maintainAspectRatio: true }
                });
                return;
            }
            
            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe', '#43e97b', '#fa709a'];
            
            charts[canvasId] = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors.slice(0, labels.length),
                        borderWidth: 2,
                        borderColor: 'white'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { size: 11 } } },
                        tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw.toFixed(1)}%` } }
                    }
                }
            });
        }
        
        function createHistogram(canvasId, sizes) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            if (charts[canvasId]) {
                charts[canvasId].destroy();
            }
            
            if (!sizes || sizes.length === 0) {
                charts[canvasId] = new Chart(ctx, {
                    type: 'bar',
                    data: { labels: ['No Data'], datasets: [{ data: [0], backgroundColor: '#ccc' }] },
                    options: { responsive: true, maintainAspectRatio: true }
                });
                return;
            }
            
            // Create size bins
            const bins = [
                { label: '0-100', min: 0, max: 100, count: 0 },
                { label: '101-500', min: 101, max: 500, count: 0 },
                { label: '501-1000', min: 501, max: 1000, count: 0 },
                { label: '1001-1500', min: 1001, max: 1500, count: 0 },
                { label: '1500+', min: 1501, max: Infinity, count: 0 }
            ];
            
            sizes.forEach(size => {
                for (let bin of bins) {
                    if (size >= bin.min && size <= bin.max) {
                        bin.count++;
                        break;
                    }
                }
            });
            
            charts[canvasId] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: bins.map(b => b.label),
                    datasets: [{
                        label: 'Packet Count',
                        data: bins.map(b => b.count),
                        backgroundColor: '#667eea',
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => `${ctx.raw} packets` } } },
                    scales: { y: { beginAtZero: true, title: { display: true, text: 'Number of Packets' } }, x: { title: { display: true, text: 'Packet Size (bytes)' } } }
                }
            });
        }
        
        function createTimeline(canvasId, timelineData) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            if (charts[canvasId]) {
                charts[canvasId].destroy();
            }
            
            if (!timelineData || timelineData.length === 0) {
                charts[canvasId] = new Chart(ctx, {
                    type: 'line',
                    data: { labels: ['No Data'], datasets: [{ data: [0], borderColor: '#ccc' }] },
                    options: { responsive: true, maintainAspectRatio: true }
                });
                return;
            }
            
            const labels = timelineData.map((_, i) => `${i + 1}s`);
            
            charts[canvasId] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Bytes per Second',
                        data: timelineData,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102,126,234,0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#667eea'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toFixed(0)} bytes` } } },
                    scales: { y: { beginAtZero: true, title: { display: true, text: 'Bytes Transferred' } }, x: { title: { display: true, text: 'Time (seconds)' } } }
                }
            });
        }
        
        function showLoader(show) {
            document.getElementById('loader').classList.toggle('active', show);
            document.getElementById('analyzeBtn').disabled = show;
        }
        
        function showError(msg) {
            const div = document.getElementById('errorMsg');
            div.textContent = msg;
            div.classList.add('active');
            setTimeout(() => div.classList.remove('active'), 5000);
        }
        
        function hideError() {
            document.getElementById('errorMsg').classList.remove('active');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
